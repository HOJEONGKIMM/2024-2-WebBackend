<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Arial', sans-serif;
        }
        .navbar {
            background-color: #0044cc;
        }
        .navbar .logo {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: bold;
        }
        .nav-link {
            color: #ffffff !important;
        }
        .main-container {
            margin: 30px auto;
            max-width: 1200px;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .ingredient-card {
            display: inline-block;
            background-color: #e7f1ff;
            border: 1px solid #0044cc;
            border-radius: 8px;
            padding: 5px 10px;
            margin: 5px;
            position: relative;
            font-size: 0.9rem;
        }
        .ingredient-card button {
            background: none;
            border: none;
            color: #ff0000;
            margin-left: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-category {
            margin: 5px;
        }
        .btn-category.active {
            background-color: #003399;
            color: #ffffff;
        }
        .recipe-list {
            list-style-type: none;
            padding: 0;
        }
        .recipe-list li {
            display: flex;
            align-items: flex-start;
            background-color: #e7f1ff;
            border: 1px solid #0044cc;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .recipe-list img {
            max-width: 100px;
            margin-right: 15px;
            border-radius: 8px;
        }
        .recipe-content {
            flex: 1;
        }
        .recipe-content h5 {
            margin: 0;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand logo" href="#">Recipe Finder</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Recipes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container main-container">
        <div class="row">
            <!-- Left Side: User Input -->
            <div class="col-md-4">
                <h2 class="mb-4">Enter Your Ingredients</h2>
                <div class="input-section mb-4">
                    <div class="input-group mb-2">
                        <input type="text" class="form-control" id="ingredient-input" placeholder="Enter ingredients (separated by space)" onkeydown="handleKeyInput(event)">
                        <button class="btn btn-primary" onclick="addIngredients()">Add</button>
                    </div>
                    <div id="ingredient-list" class="d-flex flex-wrap mb-2"></div>
                    
                    <!-- Category Buttons -->
                    <div class="mb-3 text-center">
                        <button class="btn btn-outline-primary btn-category" data-category="Korean" onclick="selectCategory('Korean')">한식</button>
                        <button class="btn btn-outline-primary btn-category" data-category="Chinese" onclick="selectCategory('Chinese')">중식</button>
                        <button class="btn btn-outline-primary btn-category" data-category="Japanese" onclick="selectCategory('Japanese')">일식</button>
                    </div>
                    
                    <button class="btn btn-result w-100" onclick="showResults()">Show Recipes</button>
                </div>
            </div>
            
            <!-- Right Side: Recipe Result -->
            <div class="col-md-8">
                <h3>Recommended Recipes</h3>
                <ul id="recipe-list" class="recipe-list"></ul>
            </div>
        </div>
    </div>
    
    <!-- Modal for Recipe Details -->
    <div class="modal fade" id="recipeModal" tabindex="-1" aria-labelledby="recipeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="recipeModalLabel">Recipe Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="recipe-details"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedCategory = '';

        function handleKeyInput(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                addIngredients();
            }
        }

        function addIngredients() {
            const input = document.getElementById('ingredient-input');
            const list = document.getElementById('ingredient-list');
            const ingredients = input.value.split(' ').filter(ing => ing.trim() !== '');

            ingredients.forEach(ingredient => {
                const div = document.createElement('div');
                div.className = 'ingredient-card';
                div.textContent = ingredient;

                const removeBtn = document.createElement('button');
                removeBtn.textContent = '×';
                removeBtn.onclick = function() {
                    list.removeChild(div);
                };

                div.appendChild(removeBtn);
                list.appendChild(div);
            });

            input.value = ''; // Clear the input field
        }

        function selectCategory(category) {
            selectedCategory = category;
            document.querySelectorAll('.btn-category').forEach(button => {
                button.classList.remove('active');
                if (button.getAttribute('data-category') === category) {
                    button.classList.add('active');
                }
            });
        }

        async function showResults() {
            const recipeList = document.getElementById('recipe-list');
            recipeList.innerHTML = ''; // Clear previous results

            if (!selectedCategory) {
                alert('Please select a category first.');
                return;
            }

            try {
                // Fetch recipes from the backend based on selected category
                const response = await fetch(`http://your-backend-api-url.com/recipes?category=${selectedCategory}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch recipes');
                }

                const recipes = await response.json();

                // Display only the first 5 recipes
                recipes.slice(0, 5).forEach((recipe, index) => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <img src="${recipe.image}" alt="${recipe.name}">
                        <div class="recipe-content">
                            <h5>${recipe.name}</h5>
                            <p><strong>재료:</strong> ${recipe.ingredients.join(', ')}</p>
                            <button class="btn btn-sm btn-primary" onclick="showRecipeDetails(${index})">View More</button>
                        </div>
                    `;
                    recipeList.appendChild(li);
                });

                window.recipeData = recipes; // Store recipes for modal details
            } catch (error) {
                console.error('Error fetching recipes:', error);
                alert('An error occurred while fetching recipes. Please try again later.');
            }
        }

        function showRecipeDetails(index) {
            const selectedRecipe = window.recipeData[index];
            const modalTitle = document.getElementById('recipeModalLabel');
            const modalBody = document.getElementById('recipe-details');

            modalTitle.textContent = selectedRecipe.name;
            modalBody.innerHTML = `
                <p><strong>재료:</strong> ${selectedRecipe.ingredients.join(', ')}</p>
                <h6>레시피</h6>
                <ol>${selectedRecipe.steps.map(step => `<li>${step}</li>`).join('')}</ol>
            `;

            const recipeModal = new bootstrap.Modal(document.getElementById('recipeModal'));
            recipeModal.show();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
